name: Release binaries

# Builds the `fmd` CLI for Linux, macOS (Intel + Apple Silicon), and Windows when
# a version tag is pushed, smoke-tests each freshly built binary, packages it with
# a per-archive SHA-256, and attaches the archives plus a combined SHA256SUMS file
# to the GitHub release. Hand-rolled (no cargo-dist dependency) to keep the
# release path auditable and dependency-lean, matching the engine's philosophy.
#
# The WASM/npm package is released separately by release-wasm.yml.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {} # allow a manual dry run (build + smoke, no publish)

# Least privilege: the build jobs only upload artifacts (read is enough); only
# the release job needs write to create the release and attach assets.
permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          # macos-13 is the Intel runner and macos-latest is Apple Silicon, so
          # each macOS target builds natively — the smoke test runs a binary the
          # runner can actually execute (no Rosetta assumption).
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build fmd (release)
        run: cargo build --release --bin fmd --target ${{ matrix.target }}

      # Smoke-test the freshly built binary on its native platform (Unix only;
      # the bash smoke script needs a POSIX shell + python3, both present on the
      # GitHub Linux/macOS runners).
      - name: Smoke test (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: scripts/release-smoke.sh "target/${{ matrix.target }}/release/fmd"

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          name="fmd-${GITHUB_REF_NAME}-${{ matrix.target }}"
          staging="$(mktemp -d)/$name"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/fmd" "$staging/"
          cp README.md LICENSE* CHANGELOG.md "$staging/" 2>/dev/null || true
          tar -C "$(dirname "$staging")" -czf "$name.tar.gz" "$name"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$name.tar.gz" > "$name.tar.gz.sha256"
          else
            shasum -a 256 "$name.tar.gz" > "$name.tar.gz.sha256"
          fi
          echo "ASSET=$name.tar.gz" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $name = "fmd-$env:GITHUB_REF_NAME-${{ matrix.target }}"
          $staging = Join-Path $env:RUNNER_TEMP $name
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/fmd.exe" $staging
          Copy-Item README.md, LICENSE, CHANGELOG.md $staging -ErrorAction SilentlyContinue
          Compress-Archive -Path "$staging/*" -DestinationPath "$name.zip" -Force
          (Get-FileHash "$name.zip" -Algorithm SHA256).Hash.ToLower() + "  $name.zip" `
            | Out-File -Encoding ascii "$name.zip.sha256"
          "ASSET=$name.zip" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding ascii

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fmd-${{ matrix.target }}
          path: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write # create the release and upload assets
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Combine checksums
        run: |
          set -euo pipefail
          cd dist
          cat ./*.sha256 > SHA256SUMS
          echo "Release assets:"; ls -1

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
            dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
