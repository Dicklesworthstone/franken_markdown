name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Rust quality gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install WASM target
        run: rustup target add wasm32-unknown-unknown

      - name: Format
        run: cargo fmt --check

      - name: Check all native targets
        run: cargo check --all-targets

      - name: Check std-only core
        run: cargo check --no-default-features --lib

      - name: Check clean-room policy
        run: scripts/check-policy.sh

      - name: Check WASM core
        run: scripts/check-wasm-core.sh

      - name: Check deterministic output
        run: scripts/check-determinism.sh

      - name: Check parser conformance
        run: scripts/parser-diff.sh

      - name: Check claim discipline (README <-> capabilities)
        run: scripts/check-claim-discipline.sh --self-test

      - name: Check perf-counters restore cycle (qw1.8.2)
        run: scripts/perf-counters.sh --self-test

      - name: Check perf-compare classifier (qw1.8.4)
        run: scripts/perf-compare.sh --self-test

      - name: Check e2e harness machinery (grn.4.1)
        run: scripts/e2e/lib.sh --self-test

      - name: Check no undocumented test doubles (grn.3.2)
        run: scripts/check-test-doubles.sh

      - name: Check CommonMark conformance (ratcheted floor)
        run: scripts/commonmark-conformance.sh ci

      - name: Test
        run: cargo test

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Release smoke test (built binary)
        run: |
          cargo build --release --bin fmd
          scripts/release-smoke.sh target/release/fmd

  platform-check:
    name: Cross-platform check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check all native targets
        run: cargo check --all-targets

      - name: Test
        run: cargo test

  wasm-package:
    name: WASM browser package gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install WASM target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.126 --locked

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: WASM package gate (build + headless render + native parity + size)
        run: scripts/check-wasm-package.sh ci

  batch:
    name: Native batch feature (Asupersync)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The batch feature pulls Asupersync (heavy, native-only); run it in its
      # own job so the main quality gate stays fast. Proves the feature compiles,
      # the scheduler + deterministic-receipt + cancellation lab tests pass, and
      # the throughput e2e (scenarios + receipt-determinism + negative path) runs.
      - name: Build + test the batch feature
        # Quoted: a trailing "::" makes the plain scalar invalid per the YAML spec
        # (GitHub's parser is lenient, but yamllint/editors/pre-commit reject it).
        run: "cargo test --features batch --lib batch::"

      - name: Clippy (batch feature)
        run: cargo clippy --features batch --lib -- -D warnings

      - name: Batch throughput e2e self-test
        run: scripts/batch-throughput.sh --self-test

  coverage:
    name: Coverage floor (ratcheted)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Branch coverage instrumentation needs llvm-tools; it is intentionally not
      # pinned in rust-toolchain.toml (keeps the default dev install light), so add
      # it here. cargo-llvm-cov is installed the same way as wasm-bindgen-cli above.
      - name: Install llvm-tools-preview
        run: rustup component add llvm-tools-preview

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      # Fast machinery sanity (lib-only branch probe) before the full merged run.
      - name: Coverage self-test
        run: scripts/coverage.sh --self-test

      # Full merged measurement (default + batch + wasm-bindgen, with branch) and
      # the ratcheted floor gate: fails if line/region/branch/function coverage
      # drops below tests/fixtures/coverage/coverage-floor.txt.
      - name: Coverage floor check
        run: scripts/coverage.sh --check ci
